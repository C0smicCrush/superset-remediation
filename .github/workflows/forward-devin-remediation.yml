name: Forward Devin Remediation Requests

on:
  issues:
    types:
      - labeled

jobs:
  forward:
    if: github.event.label.name == 'devin-remediate'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: read
    steps:
      - name: Forward issue label event to automation repo
        env:
          DISPATCH_TOKEN: ${{ secrets.AUTOMATION_REPO_DISPATCH_TOKEN }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
        run: |
          PAYLOAD=$(python3 - <<'PY'
          import json
          import os
          print(json.dumps({
              "event_type": "superset_remediation_requested",
              "client_payload": {
                  "issue_number": int(os.environ["ISSUE_NUMBER"]),
                  "issue_title": os.environ["ISSUE_TITLE"],
              },
          }))
          PY
          )
          curl -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer $DISPATCH_TOKEN" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/C0smicCrush/devin-vuln-automation/dispatches \
            -d "$PAYLOAD"
